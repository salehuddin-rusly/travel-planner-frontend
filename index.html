<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="background: white; padding: 15px; display: flex; justify-content: center; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px;">
        <a href="index.html" style="text-decoration: none; color: #007bff; font-weight: bold;">Dashboard</a>
        <a href="about.html" style="text-decoration: none; color: #666; font-weight: bold;">About Project</a>
    </nav>

    <div class="container">
        <h1>Travel Planner</h1>
        
        <h2 id="total-budget" style="text-align: center; color: #28a745; margin-bottom: 20px;">Total Budget: RM0</h2>
        
        <form id="trip-form">
            <input type="text" id="destination" placeholder="Destination (e.g. Osaka)" required>
            <div style="display: flex; gap: 10px;">
                <input type="date" id="start_date" style="flex: 1;">
                <input type="date" id="end_date" style="flex: 1;">
            </div>
            <input type="number" id="budget" placeholder="Budget (RM)">
            <button type="submit">Add Trip</button>
        </form>

        <div style="margin: 20px 0; display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="search-bar" placeholder="Search destination..." style="border-color: #007bff;">
            
            <select id="sort-filter" style="border-color: #28a745;">
                <option value="date-asc">Sort by: Date (Soonest)</option>
                <option value="budget-desc">Sort by: Budget (High to Low)</option>
                <option value="budget-asc">Sort by: Budget (Low to High)</option>
            </select>
        </div>

        <div id="trips-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
